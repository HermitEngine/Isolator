<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Picked Element</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #fff;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }

      #missing {
        display: none;
        min-height: 100vh;
        padding: 24px;
        font: 16px/1.5 system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <iframe id="preview" referrerpolicy="no-referrer"></iframe>
    <main id="missing">
      <h1 id="selector">No captured element found</h1>
      <p id="source">The captured preview is no longer available in extension storage.</p>
    </main>
    <script src="viewer.js"></script>
  </body>
</html>
